<!DOCTYPE html>
<html class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 p-0 bg-black">

    <div class="bg-black min-h-screen w-full flex items-center justify-center p-6">
        
        <div class="group w-full max-w-sm bg-zinc-900 border border-zinc-800 p-10 rounded-[40px] transition-all duration-500 hover:border-blue-600/50 hover:shadow-[0_0_40px_rgba(37,99,235,0.1)]">
            
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 bg-zinc-800 rounded-full mb-6 border border-zinc-700 flex items-center justify-center text-3xl shadow-inner transition-transform group-hover:scale-110 duration-500">
                    🚀
                </div>
                
                <h1 class="text-white text-4xl font-black italic tracking-tighter uppercase leading-none">
                    Day 07
                </h1>
                <p class="text-blue-500 font-bold text-xs uppercase tracking-[0.2em] mt-3">
                    Week 1 Finale
                </p>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-10">
                <div class="bg-zinc-800/50 py-2 rounded-xl text-[10px] text-zinc-400 font-bold text-center border border-zinc-800 uppercase">Html5</div>
                <div class="bg-zinc-800/50 py-2 rounded-xl text-[10px] text-zinc-400 font-bold text-center border border-zinc-800 uppercase">Tailwind</div>
                <div class="bg-zinc-800/50 py-2 rounded-xl text-[10px] text-zinc-400 font-bold text-center border border-zinc-800 uppercase">Css3</div>
            </div>

            <div class="mt-8 space-y-3">
                <button class="w-full py-4 bg-white text-black font-black rounded-2xl transition-all hover:bg-blue-600 hover:text-white active:scale-95 uppercase tracking-tighter">
                    Complete Week 1
                </button>
                
                <a href="#" class="block w-full py-4 bg-zinc-800/50 text-zinc-400 font-bold text-center rounded-2xl border border-zinc-800 transition-all hover:text-white hover:border-zinc-600">
                    Github Profile
                </a>
            </div>

            <p class="text-zinc-600 text-[10px] text-center mt-10 font-bold uppercase tracking-widest italic">
                "Logic over Luck"
            </p>
        </div>

    </div>

</body>
</html>
