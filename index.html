<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 20: Persistent Memory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col items-center justify-start pt-20 font-sans text-slate-200">

  <div class="w-full max-w-md bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
    <h1 class="text-2xl font-black mb-6 text-white flex items-center gap-3">
        <span class="w-3 h-8 bg-indigo-500 rounded-full"></span>
        MEMORY BANK
    </h1>

    <div class="flex gap-2 mb-8">
        <input 
            type="text" 
            id="taskInput" 
            placeholder="Store a thought..." 
            class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition-all text-sm"
        >
        <button id="saveBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition-all active:scale-95">
            SAVE
        </button>
    </div>

    <div id="displayBox" class="space-y-3">
        </div>

    <button id="clearBtn" class="mt-8 text-slate-500 hover:text-red-400 text-xs uppercase tracking-widest font-bold transition-colors w-full">
        Wipe Memory
    </button>
  </div>

  <script>
    const input = document.getElementById('taskInput');
    const saveBtn = document.getElementById('saveBtn');
    const displayBox = document.getElementById('displayBox');
    const clearBtn = document.getElementById('clearBtn');

    // 1. THE LOAD FUNCTION (Runs on startup)
    function loadMemory() {
        // Grab data from LocalStorage using the key 'userNote'
        const savedData = localStorage.getItem('userNote');

        if (savedData) {
            displayBox.innerHTML = `
                <div class="bg-indigo-500/10 border border-indigo-500/30 p-4 rounded-2xl">
                    <p class="text-xs text-indigo-400 font-black uppercase mb-1">Stored Content:</p>
                    <p class="text-white font-medium">${savedData}</p>
                </div>
            `;
        } else {
            displayBox.innerHTML = `<p class="text-slate-600 italic text-center">No data in memory.</p>`;
        }
    }

    // Run load function immediately when page starts
    loadMemory();

    // 2. THE SAVE LOGIC
    saveBtn.addEventListener('click', function() {
        const textToSave = input.value;

        if (textToSave !== "") {
            // This line saves data into the browser's secret vault
            localStorage.setItem('userNote', textToSave);
            
            input.value = ""; // Clear input
            loadMemory();    // Refresh the display
            alert("Saved to Browser Memory!");
        }
    });

    // 3. THE WIPE LOGIC
    clearBtn.addEventListener('click', function() {
        localStorage.removeItem('userNote'); // Deletes only this key
        // Or: localStorage.clear(); // Deletes EVERYTHING
        loadMemory();
    });
  </script>

</body>
</html>
