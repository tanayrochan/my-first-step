<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 18: Objects & Profiles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col items-center justify-start p-10 font-sans">

  <div class="w-full max-w-2xl text-center">
    <h1 class="text-indigo-500 font-black text-xs tracking-[0.5em] uppercase mb-2">Advanced Data</h1>
    <h2 class="text-white text-3xl font-bold mb-10">Skill Profiles</h2>

    <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
        </div>

    <button id="loadBtn" class="mt-12 bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-2xl font-black transition-all active:scale-95 shadow-lg shadow-indigo-600/20">
        GENERATE PROFILES
    </button>
  </div>

  <script>
    // 1. DATA: An Array of Objects
    const skillProfiles = [
        { name: "JavaScript", level: "Master", color: "border-yellow-500", text: "text-yellow-500" },
        { name: "Tailwind CSS", level: "Pro", color: "border-cyan-400", text: "text-cyan-400" },
        { name: "Logic & Math", level: "Advanced", color: "border-purple-500", text: "text-purple-500" },
        { name: "Beast Mode", level: "Max", color: "border-red-500", text: "text-red-500" }
    ];

    const container = document.getElementById('cardContainer');
    const btn = document.getElementById('loadBtn');

    btn.addEventListener('click', function() {
        // Clear container
        container.innerHTML = "";

        // 2. THE LOOP
        skillProfiles.forEach(function(profile) {
            
            // Build the card
            const card = document.createElement('div');
            
            // Use the object's color property to style the border!
            card.className = `bg-zinc-900 p-6 rounded-3xl border-2 ${profile.color} shadow-xl transform transition-all hover:-translate-y-2`;

            // Build the internal HTML using "Template Literals" (Backticks ``)
            card.innerHTML = `
                <h3 class="text-xs font-black uppercase tracking-widest text-zinc-500 mb-1">Skill Name</h3>
                <p class="text-2xl font-bold text-white mb-4">${profile.name}</p>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-current ${profile.text}"></span>
                    <span class="${profile.text} font-mono text-sm uppercase font-bold">${profile.level}</span>
                </div>
            `;
            
            container.appendChild(card);
        });

        btn.innerText = "REFRESH PROFILES";
    });
  </script>

</body>
</html>
