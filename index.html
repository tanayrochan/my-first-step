<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 12: Logic & Memory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col items-center justify-center font-sans">

  <div class="text-center p-12 bg-slate-900 border border-slate-800 rounded-[3rem] shadow-2xl">
    <h1 id="headline" class="text-white text-5xl font-black mb-8 uppercase tracking-tighter transition-all duration-500">
      System Ready
    </h1>

    <button id="mainBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-5 rounded-2xl font-black tracking-widest active:scale-95 transition-all shadow-lg shadow-blue-500/20">
      EXECUTE
    </button>
    
    <p class="text-slate-500 mt-6 font-mono text-sm italic">Logic Status: Operational</p>
  </div>

  <script>
    // 1. Grab the elements from the page
    const btn = document.getElementById('mainBtn');
    const text = document.getElementById('headline');

    // 2. State Variable (The computer's "Memory")
    let isSystemOn = false;

    // 3. The Event Listener (The proper "Regular JS" way)
    btn.addEventListener('click', function() {
      
      if (isSystemOn === false) {
        // --- ACTION: TURN SYSTEM ON ---
        text.innerText = "SYSTEM ONLINE";
        text.classList.replace('text-white', 'text-emerald-400');
        text.classList.add('scale-110');
        
        btn.innerText = "SHUTDOWN";
        btn.classList.replace('bg-blue-600', 'bg-red-600');
        
        isSystemOn = true; // Update memory to say it is ON
      } else {
        // --- ACTION: TURN SYSTEM OFF ---
        text.innerText = "SYSTEM OFFLINE";
        text.classList.replace('text-emerald-400', 'text-white');
        text.classList.remove('scale-110');
        
        btn.innerText = "BOOT UP";
        btn.classList.replace('bg-red-600', 'bg-blue-600');
        
        isSystemOn = false; // Update memory to say it is OFF
      }
      
    });
  </script>

</body>
</html>
