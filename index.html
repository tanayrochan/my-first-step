<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 22: Async Mastery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-6 font-mono">

  <div class="w-full max-w-lg bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden shadow-2xl">
    <div class="bg-zinc-800 px-4 py-2 flex gap-2 items-center">
        <div class="w-3 h-3 rounded-full bg-red-500"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
        <div class="w-3 h-3 rounded-full bg-green-500"></div>
        <span class="text-zinc-500 text-xs ml-2 italic">system_fetch.sh</span>
    </div>

    <div class="p-8">
        <p id="status" class="text-emerald-500 text-xs mb-4 uppercase tracking-widest">[ Status: Ready ]</p>
        
        <div class="min-h-[100px]">
            <p id="quoteOutput" class="text-white text-xl font-bold leading-relaxed">
                > Initializing connection...
            </p>
        </div>

        <button id="fetchBtn" class="mt-10 w-full border border-emerald-500/50 hover:bg-emerald-500/10 text-emerald-500 py-3 rounded-md transition-all active:scale-95">
            EXECUTE FETCH
        </button>
    </div>
  </div>

  <script>
    const output = document.getElementById('quoteOutput');
    const status = document.getElementById('status');
    const btn = document.getElementById('fetchBtn');

    // THE ASYNC FUNCTION
    async function getQuote() {
        try {
            // 1. Update UI
            status.innerText = "[ Status: Fetching... ]";
            output.innerText = "> Requesting data from server...";
            btn.disabled = true;

            // 2. The Wait (Await the fetch)
            const response = await fetch('https://api.adviceslip.com/advice');
            
            // 3. The Wait (Await the conversion to JSON)
            const data = await response.json();

            // 4. Success!
            output.innerText = `> "${data.slip.advice}"`;
            status.innerText = "[ Status: Success ]";

        } catch (error) {
            // If the internet dies or the API is down
            output.innerText = "> ERROR: Connection failed.";
            status.innerText = "[ Status: Failed ]";
        } finally {
            // This runs no matter what (Success or Fail)
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', getQuote);
  </script>

</body>
</html>
