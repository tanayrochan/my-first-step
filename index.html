<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 19: Data Filtering</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 min-h-screen flex flex-col items-center p-10 font-sans text-stone-200">

  <div class="w-full max-w-3xl">
    <header class="flex justify-between items-center mb-10 border-b border-stone-800 pb-6">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-white">BEAST GEAR</h1>
            <p class="text-stone-500 text-sm">Inventory Management System</p>
        </div>
        
        <div class="flex gap-2">
            <button id="showAll" class="bg-stone-800 hover:bg-stone-700 px-4 py-2 rounded-lg text-xs font-bold transition-all">SHOW ALL</button>
            <button id="showPremium" class="bg-amber-600 hover:bg-amber-500 px-4 py-2 rounded-lg text-xs font-bold text-black transition-all">PREMIUM ONLY</button>
        </div>
    </header>

    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        </div>
  </div>

  <script>
    // 1. DATA: Our Product List
    const products = [
        { name: "Alpha Watch", price: 299, type: "Premium" },
        { name: "Basic Tee", price: 25, type: "Standard" },
        { name: "Neural Link", price: 850, type: "Premium" },
        { name: "Power Bank", price: 45, type: "Standard" },
        { name: "Stealth Hoody", price: 120, type: "Premium" }
    ];

    const gallery = document.getElementById('gallery');
    const allBtn = document.getElementById('showAll');
    const premiumBtn = document.getElementById('showPremium');

    // 2. THE RENDER FUNCTION (The Factory)
    // We put the loop inside a function so we can call it whenever we want!
    function displayProducts(itemsToDisplay) {
        gallery.innerHTML = ""; // Clear current view

        itemsToDisplay.forEach(function(product) {
            const card = document.createElement('div');
            card.className = "bg-stone-900 border border-stone-800 p-6 rounded-2xl flex justify-between items-center group hover:border-stone-600 transition-all";
            
            // Logic for a "Premium" badge
            const badge = product.type === "Premium" ? `<span class="text-[10px] bg-amber-500/10 text-amber-500 px-2 py-1 rounded-md font-black uppercase">Premium</span>` : "";

            card.innerHTML = `
                <div>
                    ${badge}
                    <h3 class="text-lg font-bold text-white mt-1">${product.name}</h3>
                </div>
                <div class="text-right">
                    <p class="text-stone-500 text-xs">PRICE</p>
                    <p class="text-xl font-mono text-stone-200">$${product.price}</p>
                </div>
            `;
            gallery.appendChild(card);
        });
    }

    // 3. THE LOGIC (The Filters)
    
    // Show everything at the start
    displayProducts(products);

    // Filter for Premium
    premiumBtn.addEventListener('click', function() {
        // .filter is a new magic trick! It creates a sub-list
        const filteredList = products.filter(function(p) {
            return p.type === "Premium";
        });
        displayProducts(filteredList);
    });

    // Show All again
    allBtn.addEventListener('click', function() {
        displayProducts(products);
    });

  </script>

</body>
</html>
