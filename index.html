<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Fetch</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-6 font-mono">

  <div class="w-full max-w-lg bg-zinc-900 border border-zinc-800 rounded-lg shadow-2xl">
    <div class="bg-zinc-800 px-4 py-2 flex gap-2 items-center">
        <div class="w-3 h-3 rounded-full bg-red-500"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
        <div class="w-3 h-3 rounded-full bg-green-500"></div>
    </div>

    <div class="p-8">
        <p id="status" class="text-emerald-500 text-xs mb-4 uppercase tracking-widest">[ Status: Ready ]</p>
        <p id="output" class="text-white text-xl font-bold min-h-[100px]"> > Initializing... </p>

        <button id="btn" class="mt-10 w-full border border-emerald-500/50 hover:bg-emerald-500/10 text-emerald-500 py-3 rounded-md transition-all active:scale-95">
            EXECUTE FETCH
        </button>
    </div>
  </div>

  <script>
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const btn = document.getElementById('btn');

    async function getQuote() {
        try {
            btn.disabled = true;
            status.innerText = "[ Status: Fetching... ]";
            
            const res = await fetch('https://api.adviceslip.com/advice');
            const data = await res.json();

            output.innerText = `> "${data.slip.advice}"`;
            status.innerText = "[ Status: Success ]";
        } catch (err) {
            output.innerText = "> ERROR: Connection failed.";
            status.innerText = "[ Status: Failed ]";
        } finally {
            btn.disabled = false;
        }
    }

    btn.onclick = getQuote;
  </script>

</body>
</html>
