<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 15: The Mystery Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex flex-col items-center justify-center p-4">

  <div class="bg-zinc-900 p-10 rounded-[3rem] border-2 border-zinc-800 shadow-2xl w-full max-w-sm text-center">
    
    <h1 class="text-zinc-500 font-black text-xs tracking-[0.5em] uppercase mb-4">Neural Scanner</h1>
    
    <div class="mb-8">
        <h2 id="message" class="text-white text-2xl font-bold min-h-[60px] flex items-center justify-center transition-all duration-300">
            Guess a number (1-10)
        </h2>
    </div>

    <input 
      type="number" 
      id="guessInput" 
      placeholder="?" 
      class="w-32 bg-black border-2 border-zinc-700 text-white p-6 rounded-3xl mb-8 outline-none focus:border-yellow-500 text-center text-4xl font-black transition-all"
    >

    <button id="checkBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-tighter text-xl">
        Verify Guess
    </button>

    <button id="resetBtn" class="mt-6 text-zinc-500 hover:text-white underline text-sm hidden">
        Play Again?
    </button>

  </div>

  <script>
    // 1. Setup the Secret Number (1 to 10)
    let secretNumber = Math.floor(Math.random() * 10) + 1;

    // 2. Get the elements
    const msg = document.getElementById('message');
    const input = document.getElementById('guessInput');
    const btn = document.getElementById('checkBtn');
    const reset = document.getElementById('resetBtn');

    // 3. Game Logic
    btn.addEventListener('click', function() {
        const userGuess = Number(input.value);

        if (userGuess === secretNumber) {
            // WINNER!
            msg.innerText = "🎯 CORRECT! ACCESS GRANTED";
            msg.classList.replace('text-white', 'text-yellow-500');
            btn.classList.add('hidden');
            reset.classList.remove('hidden');
        } else if (userGuess > secretNumber) {
            // TOO HIGH
            msg.innerText = "LOWER...";
            msg.classList.add('text-red-400');
            setTimeout(() => msg.classList.remove('text-red-400'), 500);
        } else {
            // TOO LOW
            msg.innerText = "HIGHER...";
            msg.classList.add('text-blue-400');
            setTimeout(() => msg.classList.remove('text-blue-400'), 500);
        }

        input.value = ""; // Clear input for next try
    });

    // 4. Reset Logic
    reset.addEventListener('click', function() {
        secretNumber = Math.floor(Math.random() * 10) + 1; // Pick new number
        msg.innerText = "Guess a number (1-10)";
        msg.classList.replace('text-yellow-500', 'text-white');
        btn.classList.remove('hidden');
        reset.classList.add('hidden');
    });
  </script>

</body>
</html>
