<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 16: Array Power</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

  <div class="bg-zinc-900 p-10 rounded-[3rem] border border-zinc-800 shadow-2xl w-full max-w-sm text-center">
    
    <h1 class="text-indigo-500 font-black text-xs tracking-[0.4em] uppercase mb-4">Vibe Selector</h1>
    
    <div class="bg-black/40 py-12 px-4 rounded-3xl mb-8 border border-white/5 min-h-[160px] flex items-center justify-center">
        <h2 id="vibeDisplay" class="text-white text-3xl font-bold transition-all duration-500">
            Ready?
        </h2>
    </div>

    <button id="genBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl active:scale-90 transition-all shadow-lg shadow-indigo-500/20">
        GENERATE VIBE
    </button>

  </div>

  <script>
    // 1. THE ARRAY (Our list of items)
    const vibes = [
        "Stay Focused", 
        "Keep Grinding", 
        "Take a Break", 
        "Code All Night", 
        "Drink More Water",
        "Think Bigger",
        "Trust the Process"
    ];

    const display = document.getElementById('vibeDisplay');
    const btn = document.getElementById('genBtn');

    btn.addEventListener('click', function() {
        
        // 2. Logic to pick a random index from the array
        // vibes.length tells us how many items are in the list
        const randomIndex = Math.floor(Math.random() * vibes.length);
        
        // 3. Get the item using the random number
        const selectedVibe = vibes[randomIndex];

        // 4. Update the screen
        display.innerText = selectedVibe;
        
        // Visual flair
        display.classList.add('scale-110', 'text-indigo-400');
        setTimeout(() => {
            display.classList.remove('scale-110', 'text-indigo-400');
        }, 300);
    });
  </script>

</body>
</html>
