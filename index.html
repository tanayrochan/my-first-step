<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center bg-[radial-gradient(circle_at_top_left,_var(--tw-gradient-stops))] from-indigo-900 via-slate-950 to-black">

    <div class="relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-3xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
        
        <div class="relative px-7 py-10 bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl w-80 text-white shadow-2xl">
            <div class="h-12 w-12 bg-blue-500 rounded-full mb-6 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
            <h2 class="text-2xl font-bold mb-2">Glass Card</h2>
            <p class="text-slate-400 leading-relaxed">
                Notice how the background colors blur through this card. This is premium UI.
            </p>
            <button class="mt-6 w-full py-3 bg-white text-black font-bold rounded-xl hover:bg-blue-400 transition">
                Get Started
            </button>
        </div>
    </div>

</body>
</html>
