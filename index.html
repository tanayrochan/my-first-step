<!DOCTYPE html>
<html>
<head>
    <title>Day 11: Simple Toggle</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>

    <h1 id="msg">The Room is Dark</h1>
    <button id="btn">Turn on Light</button>

    <script>
        // Simple 3-line brain
        const myButton = document.getElementById('btn');
        const myTitle = document.getElementById('msg');

        myButton.onclick = function() {
            document.body.style.backgroundColor = "white";
            document.body.style.color = "black";
            myTitle.innerText = "Light is ON! 💡";
            myButton.innerText = "It Works!";
        };
    </script>

</body>
</html>
