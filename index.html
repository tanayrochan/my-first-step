<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 17: The Beast Factory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col items-center justify-start p-10 font-sans">

  <div class="w-full max-w-md text-center">
    <h1 class="text-emerald-500 font-black text-xs tracking-[0.5em] uppercase mb-2">Automated Factory</h1>
    <h2 class="text-white text-3xl font-bold mb-10">Skill Inventory</h2>

    <div id="listContainer" class="flex flex-wrap justify-center gap-3 min-h-[100px] p-6 bg-zinc-900/50 rounded-3xl border border-zinc-800">
        <p id="placeholder" class="text-zinc-600 italic">Storage Empty...</p>
    </div>

    <button id="loadBtn" class="mt-12 bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-4 rounded-2xl font-black tracking-widest transition-all active:scale-90 shadow-lg shadow-emerald-600/20">
        LOAD DATA
    </button>
  </div>

  <script>
    // 1. THE DATA (The Bricks)
    const skills = [
        "JavaScript", "Tailwind", "HTML5", 
        "Logic", "Loops", "Arrays", 
        "DOM", "Beast Mode", "Persistence"
    ];

    const container = document.getElementById('listContainer');
    const btn = document.getElementById('loadBtn');
    const placeholder = document.getElementById('placeholder');

    btn.addEventListener('click', function() {
        
        // Step A: Clear the "Storage Empty" text and any old items
        container.innerHTML = "";

        // Step B: The Factory Line (Loop)
        skills.forEach(function(skillName) {
            
            // 1. Build the Box
            const badge = document.createElement('div');
            
            // 2. Sticker/Paint the Box
            badge.className = "bg-emerald-500/10 border border-emerald-500/40 text-emerald-400 px-5 py-2 rounded-xl font-mono text-sm font-bold shadow-sm hover:bg-emerald-500/20 transition-colors cursor-default";
            
            // 3. Fill the Box
            badge.innerText = skillName;
            
            // 4. Ship it to the Screen
            container.appendChild(badge);
        });

        // Step C: Update Button Feedback
        btn.innerText = "RELOAD FACTORY";
        btn.classList.replace('bg-emerald-600', 'bg-zinc-800');
        
        console.log("Factory produced " + skills.length + " items.");
    });
  </script>

</body>
</html>
