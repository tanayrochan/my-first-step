<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center text-white">

  <div class="w-full max-w-xl grid grid-cols-2 gap-6">
    <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
        <div class="space-y-4">
            <input type="text" id="nameInput" placeholder="Enter Name" class="w-full bg-black border border-zinc-700 rounded-lg p-2 outline-none">
            <select id="levelSelect" class="w-full bg-black border border-zinc-700 rounded-lg p-2">
                <option value="Noob">Noob</option>
                <option value="Beast">Beast</option>
                <option value="God Mode">God Mode</option>
            </select>
        </div>
    </div>

    <div id="profileCard" class="p-6 rounded-2xl transition-colors duration-300">
        <div id="levelBadge" class="bg-white/20 w-fit px-2 py-1 rounded text-[10px] font-bold uppercase mb-2">Noob</div>
        <h1 id="displayName" class="text-2xl font-bold">User_01</h1>
    </div>
  </div>

  <script>
    const state = { name: "User_01", level: "Noob" };

    const colors = {
        "Noob": "bg-indigo-600",
        "Beast": "bg-emerald-600",
        "God Mode": "bg-orange-500"
    };

    function render() {
        const card = document.getElementById('profileCard');
        document.getElementById('displayName').innerText = state.name;
        document.getElementById('levelBadge').innerText = state.level;
        
        card.className = `p-6 rounded-2xl transition-colors duration-300 ${colors[state.level]}`;
    }

    document.getElementById('nameInput').addEventListener('input', (e) => {
        state.name = e.target.value || "User_01";
        render();
    });

    document.getElementById('levelSelect').addEventListener('change', (e) => {
        state.level = e.target.value;
        render();
    });

    render();
  </script>
</body>
</html>
