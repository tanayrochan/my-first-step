<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 13: User Input</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="bg-zinc-900 p-10 rounded-[2.5rem] border border-zinc-800 shadow-2xl w-full max-w-md text-center">
    
    <h1 id="display" class="text-white text-3xl font-black mb-8 transition-all duration-300">
      Who are you?
    </h1>

    <input 
      type="text" 
      id="userName" 
      placeholder="Enter your name..." 
      class="w-full bg-zinc-800 border border-zinc-700 text-white p-4 rounded-xl mb-6 outline-none focus:border-blue-500 transition-colors"
    >

    <button id="greetBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl active:scale-95 transition-all">
      INITIALIZE GREETING
    </button>

  </div>

  <script>
    // 1. Get the elements
    const output = document.getElementById('display');
    const inputField = document.getElementById('userName');
    const btn = document.getElementById('greetBtn');

    // 2. The Logic
    btn.addEventListener('click', function() {
      
      // Get the current text inside the input box
      const name = inputField.value;

      if (name === "") {
        // If they didn't type anything
        output.innerText = "Please enter a name!";
        output.classList.add('text-red-500');
      } else {
        // Success!
        output.innerText = "Hello, " + name + "!";
        output.classList.remove('text-red-500');
        output.classList.add('text-blue-400', 'scale-110');
        
        // Clear the input box so they can type again
        inputField.value = "";
      }
      
    });
  </script>

</body>
</html>
