<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-10">
  <div class="max-w-md mx-auto">
    <div class="flex gap-2 mb-8">
      <input id="in" type="text" class="flex-1 bg-zinc-900 border border-zinc-800 p-2 rounded">
      <button onclick="add()" class="bg-indigo-600 px-4 rounded">ADD</button>
    </div>
    <div id="list" class="space-y-2"></div>
  </div>

  <script>
    let projects = [];

    function render() {
      list.innerHTML = projects.map(p => `
        <div class="bg-zinc-900 p-4 rounded flex justify-between">
          <span>${p.name}</span>
          <button onclick="del(${p.id})" class="text-red-500">Delete</button>
        </div>
      `).join('');
    }

    function add() {
      if (!id_in.value) return;
      projects.push({ id: Date.now(), name: id_in.value });
      id_in.value = '';
      render();
    }

    function del(id) {
      projects = projects.filter(p => p.id !== id);
      render();
    }

    const id_in = document.getElementById('in');
    const list = document.getElementById('list');
    render();
  </script>
</body>
</html>
