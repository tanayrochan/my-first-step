<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col items-center justify-center text-white">

  <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center max-w-sm w-full">
    <button id="btn" class="bg-indigo-600 hover:bg-indigo-500 w-full p-4 rounded-xl font-bold transition-all">
      Get Simple Advice
    </button>
    
    <p id="output" class="mt-6 text-sm text-zinc-400 italic">Click the button to start...</p>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const output = document.getElementById('output');

    btn.addEventListener('click', function() {
      // 1. Ask the server
      fetch('https://api.adviceslip.com/advice')
      
        // 2. Receive raw response and convert to JSON
        .then(function(response) {
          return response.json();
        })
        
        // 3. Use the data
        .then(function(data) {
          output.innerText = data.slip.advice;
        });
    });
  </script>

</body>
</html>
